<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173226">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Тренировки">
  <title>Трекер тренировок</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Офлайн-приложение</p>
        <h1>Трекер тренировок</h1>
      </div>
      <button id="installBtn" class="ghost hidden" type="button">Установить</button>
    </header>

    <main id="app"></main>
    <div id="modalRoot"></div>
    <input id="importInput" class="hidden" type="file" accept="application/json">
    <input id="importTxtInput" class="hidden" type="file" accept=".txt,text/plain">
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
